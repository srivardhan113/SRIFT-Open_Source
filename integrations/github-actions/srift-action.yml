# GitHub Actions composite step that starts SRIFT and uses quick-share to deliver build artifacts.
# Drop this in .github/workflows/build.yml.

name: Build + SRIFT delivery
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start SRIFT daemon
        run: nohup node --experimental-strip-types cli/daemon.ts &
        env: { SRIFT_DAEMON_PORT: "3822" }

      - name: Wait for daemon
        run: |
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3822/status && break
            sleep 1
          done

      - name: Deliver build artifact via SRIFT
        id: srift
        run: |
          R=$(curl -s -X POST http://127.0.0.1:3822/quick-share \
                -H 'Content-Type: application/json' \
                -d '{"filePath":"'$PWD'/build.zip","sessionName":"ci-${{ github.run_id }}"}')
          echo "$R"
          echo "share_url=$(echo $R | jq -r .shareUrl)" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo,
              body: `Build artifact ready via SRIFT: ${{ steps.srift.outputs.share_url }}`
            })
